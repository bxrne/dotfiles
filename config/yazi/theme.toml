# Waybar-matched Dark Theme for Yazi

[mgr]
cwd = { fg = "#fcfcfa" }

# Hovered
hovered = { fg = "#382A20", bg = "#f38d70" }
preview_hovered = { underline = true }

# Find
find_keyword = { fg = "#f9cc6c", italic = true }
find_position = { fg = "#f38d70", bg = "#382A20", italic = true }

# Marker
marker_selected = { fg = "#f9cc6c", bg = "#f9cc6c" }
marker_copied = { fg = "#f38d70", bg = "#f38d70" }
marker_cut = { fg = "#fd6883", bg = "#fd6883" }

# Tab
tab_active = { fg = "#382A20", bg = "#fcfcfa" }
tab_inactive = { fg = "#fcfcfa", bg = "#382A20" }
tab_width = 1

# Border
border_symbol = "│"
border_style = { fg = "#403e41" }

# Highlighting
syntect_theme = "~/.config/yazi/gruvbox-dark.tmTheme"

[status]
separator_open = ""
separator_close = ""
separator_style = { fg = "#403e41", bg = "#382A20" }

# Mode
mode_normal = { fg = "#fcfcfa", bg = "#382A20", bold = true }
mode_select = { fg = "#382A20", bg = "#f9cc6c", bold = true }
mode_unset = { fg = "#382A20", bg = "#f38d70", bold = true }

# Progress
progress_label = { fg = "#fcfcfa", bold = true }
progress_normal = { fg = "#f9cc6c", bg = "#382A20" }
progress_error = { fg = "#fd6883", bg = "#382A20" }  # Permissions
permissions_t = { fg = "#f9cc6c" }
permissions_r = { fg = "#f38d70" }
permissions_w = { fg = "#fd6883" }
permissions_x = { fg = "#f9cc6c" }
permissions_s = { fg = "#403e41" }

[input]
border = { fg = "#f38d70" }
title = {}
value = {}
selected = { reversed = true }

[select]
border = { fg = "#f38d70" }
active = { fg = "#f38d70" }
inactive = {}

[tasks]
border = { fg = "#f38d70" }
title = {}
hovered = { underline = true }

[which]
cols = 3
mask = { bg = "#221f22" }
cand = { fg = "#f38d70" }
rest = { fg = "#fcfcfa" }
desc = { fg = "#f9cc6c" }
separator = "  "
separator_style = { fg = "#403e41" }

[help]
on = { fg = "#f9cc6c" }
run = { fg = "#f38d70" }
desc = { fg = "#fcfcfa" }
hovered = { bg = "#382A20", bold = true }
footer = { fg = "#382A20", bg = "#fcfcfa" }

[filetype]

rules = [
  # Images
  { mime = "image/*", fg = "#fd6883" },

  # Videos
  { mime = "video/*", fg = "#f9cc6c" },
  { mime = "audio/*", fg = "#f9cc6c" },

  # Archives
  { mime = "application/zip", fg = "#fd6883" },
  { mime = "application/gzip", fg = "#fd6883" },
  { mime = "application/x-tar", fg = "#fd6883" },
  { mime = "application/x-bzip", fg = "#fd6883" },
  { mime = "application/x-bzip2", fg = "#fd6883" },
  { mime = "application/x-7z-compressed", fg = "#fd6883" },
  { mime = "application/x-rar", fg = "#fd6883" },

  # Documents
  { mime = "application/pdf", fg = "#fd6883" },
  { mime = "text/*", fg = "#fcfcfa" },

  # Code
  { name = "*.rs", fg = "#f38d70" },
  { name = "*.py", fg = "#f9cc6c" },
  { name = "*.js", fg = "#f9cc6c" },
  { name = "*.ts", fg = "#f38d70" },
  { name = "*.go", fg = "#f38d70" },
  { name = "*.c", fg = "#f38d70" },
  { name = "*.cpp", fg = "#f38d70" },
  { name = "*.java", fg = "#fd6883" },
  { name = "*.sh", fg = "#f9cc6c" },

  # Special files
  { name = "*.gitignore", fg = "#403e41" },
  { name = "*.gitmodules", fg = "#403e41" },
  { name = "Makefile", fg = "#f9cc6c" },
  { name = "Dockerfile", fg = "#f38d70" },
  { name = "*.toml", fg = "#fd6883" },
  { name = "*.yaml", fg = "#fd6883" },
  { name = "*.yml", fg = "#fd6883" },
  { name = "*.json", fg = "#f9cc6c" },
  { name = "*.md", fg = "#fcfcfa" },
]

[icon]
rules = [
  { name = "*/", text = "" },
  { name = "*.rs", text = "", fg = "#f38d70" },
  { name = "*.py", text = "", fg = "#f9cc6c" },
  { name = "*.js", text = "", fg = "#f9cc6c" },
  { name = "*.json", text = "", fg = "#f9cc6c" },
  { name = "*.md", text = "", fg = "#fcfcfa" },
  { name = "*.toml", text = "", fg = "#fd6883" },
  { name = "*.yaml", text = "", fg = "#fd6883" },
  { name = "*.yml", text = "", fg = "#fd6883" },
]