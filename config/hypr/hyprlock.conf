# Background
background {
    path = ~/Pictures/wallpapers/ristretto.jpg
    blur_passes = 3
    blur_size = 8
    contrast = 1.0
    brightness = 0.9
    vibrancy = 0.2
}

# User prompt
input-field {
    size = 500, 100
    outline_thickness = 7
    font_family = JetBrains Mono Nerd Font
    font_size = 18
    inner_color = rgba(64,62,65,0.0)
    outer_color = rgba(0,0,0,1)
    text_color = rgb(000000)
    font_color = rgb(000000)
    fade_on_empty = false
    dot_size = 0.5
    rounding = 0
    position = 0, 60
    valign = center
    halign = center
    placeholder_text = auth
}

# Fail feedback (shake + red outline)
auth_fail {
    outer_color = rgb(b91c1c)      # Matte Black red
    fail_text = "Wrong password"
}

