# ============================================
# TMUX CONFIGURATION - PERSISTENT SESSIONS
# ============================================

# -------------------- GENERAL SETTINGS --------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10
set -g focus-events on

# -------------------- KEY BINDINGS --------------------
# Change prefix from Ctrl+b to Ctrl+a (more ergonomic)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -------------------- THEME (MATCHING WAYBAR) --------------------
# Status bar colors (matching #382A20 background)
set -g status-style bg=#382A20,fg=#fcfcfa
set -g status-left-length 60
set -g status-right-length 60

# Window status (centered)
set -g status-justify centre
setw -g window-status-style fg=#fcfcfa
setw -g window-status-format ' #I:#W#{?window_flags,#{window_flags},} '
setw -g window-status-current-style fg=#f38d70,bold
setw -g window-status-current-format ' #I:#W#{?window_flags,#{window_flags},} '
setw -g window-status-activity-style fg=#f9cc6c,bold
setw -g window-status-bell-style fg=#f38d70,bold,blink

# Pane borders (using coral accent)
set -g pane-border-style fg=#4a3a30
set -g pane-active-border-style fg=#f38d70

# Status bar left (user, hostname, session index)
set -g status-left '#[fg=#f9cc6c,bold]#(whoami)@#H #[fg=#fcfcfa] #[fg=#f38d70]#S #[default] '

# Status bar right (current command and encoding)
set -g status-right '#[fg=#fcfcfa]#{pane_current_command} #[fg=#f9cc6c] | #[fg=#fcfcfa] #{?client_utf8,UTF-8,ASCII} #[default] '

# Message styling
set -g message-style fg=#fcfcfa,bg=#f38d70,bold
set -g message-command-style fg=#fcfcfa,bg=#f38d70

# -------------------- PLUGIN MANAGER --------------------
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# -------------------- PERSISTENCE SETTINGS --------------------
# Enable automatic restore on tmux start
set -g @continuum-restore 'on'

# Auto-save interval (minutes)
set -g @continuum-save-interval '15'

# Resurrect processes (optional - be careful with this)
set -g @resurrect-processes 'ssh mysql redis-server'

# Resurrect strategy for vim/neovim
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# Capture pane contents
set -g @resurrect-capture-pane-contents 'on'

# -------------------- BOOT PERSISTENCE (SYSTEMD) --------------------
# This will be handled separately via systemd service

# Initialize TPM (keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
