# ============================================
# TMUX CONFIGURATION - PERSISTENT SESSIONS
# ============================================

# -------------------- GENERAL SETTINGS --------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10
set -g focus-events on

# -------------------- KEY BINDINGS --------------------
# Change prefix from Ctrl+b to Ctrl+a (more ergonomic)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -------------------- THEME (OMARCHY MATTE BLACK) --------------------
# Status bar colors (Omarchy Matte Black)
set -g status-style bg=#121212,fg=#BEBEBE
set -g status-left-length 60
set -g status-right-length 60

# Window status (centered)
set -g status-justify centre
setw -g window-status-style fg=#BEBEBE
setw -g window-status-format ' #I:#W#{?window_flags,#{window_flags},} '
setw -g window-status-current-style fg=#FFC107,bold
setw -g window-status-current-format ' #I:#W#{?window_flags,#{window_flags},} '
setw -g window-status-activity-style fg=#E68E0D,bold
setw -g window-status-bell-style fg=#D35F5F,bold,blink

# Pane borders
set -g pane-border-style fg=#333333
set -g pane-active-border-style fg=#FFC107

# Status bar left (user, hostname, session index)
set -g status-left '#[fg=#FFC107,bold]#(whoami)@#H #[fg=#BEBEBE] #[fg=#E68E0D]#S #[default] '

# Status bar right (current command and encoding)
set -g status-right '#[fg=#BEBEBE]#{pane_current_command} #[fg=#E68E0D] | #[fg=#BEBEBE] #{?client_utf8,UTF-8,ASCII} #[default] '

# Message styling
set -g message-style fg=#BEBEBE,bg=#FFC107,bold
set -g message-command-style fg=#BEBEBE,bg=#FFC107

# -------------------- PLUGIN MANAGER --------------------
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# -------------------- PERSISTENCE SETTINGS --------------------
# Disable automatic restore to allow session deletion
set -g @continuum-restore 'off'

# Auto-save interval (minutes)
set -g @continuum-save-interval '15'

# Resurrect processes (optional - be careful with this)
set -g @resurrect-processes 'ssh mysql redis-server'

# Resurrect strategy for vim/neovim
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# Capture pane contents
set -g @resurrect-capture-pane-contents 'on'

# Manual restore keybinding
bind C-r run-shell '~/.tmux/plugins/tmux-resurrect/scripts/restore.sh' \; display "Session restored!"

# -------------------- BOOT PERSISTENCE (SYSTEMD) --------------------
# This will be handled separately via systemd service

# Initialize TPM (keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
