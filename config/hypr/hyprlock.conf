# Background
background {
    path = ~/Pictures/wallpapers/better2.jpeg
    blur_passes = 3
    blur_size = 8
    contrast = 1.0
    brightness = 0.9
    vibrancy = 0.5
}

# User prompt
input-field {
    size = 500, 100
    outline_thickness = 7
    outline_color = rgb(255, 193, 7)
    font_family = JetBrainsMono Nerd Font
    font_size = 28
    inner_color = rgba(18, 18, 18, 0.8)
    outer_color = rgba(18, 18, 18, 0.0)
    text_color = rgb(190, 190, 190)
    font_color = rgb(190, 190, 190)
    fade_on_empty = false
    dot_size = 1
    dot_color = rgb(255, 193, 7)
    rounding = 12
    position = 0, 60
    valign = center
    halign = center
    placeholder_text = locked 
}

# Fail feedback (shake + red outline)
auth_fail {
    outer_color = rgb(211, 95, 95)
    fail_text = "incorrect"
}

