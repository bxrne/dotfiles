# Background
background {
    path = ~/Pictures/wallpapers/ristretto.jpg
    blur_passes = 4
    blur_size = 8
    contrast = 1.0
    brightness = 0.9
    vibrancy = 0.2
}

# User prompt
input-field {
    size = 500, 100
    outline_thickness = 5
    font_family = JetBrains Mono Nerd Font
    font_size = 16
    inner_color = rgba(64,62,65,0.8)
    outer_color = rgba(243,141,112,0.8)
    text_color = rgb(eaeaea)
    font_color = rgb(eaeaea)
    fade_on_empty = false
    dot_size = 0.2
    rounding = 3
    position = 0, 60
    valign = center
    halign = center
}

# Fail feedback (shake + red outline)
auth_fail {
    outer_color = rgb(b91c1c)      # Matte Black red
    fail_text = "Wrong password"
}

