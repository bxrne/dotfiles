# Background
background {
    path = ~/Pictures/wallpapers/ship.jpg
    blur_passes = 3
    blur_size = 8
    contrast = 1.0
    brightness = 0.9
    vibrancy = 0.5
}

# User prompt
input-field {
    size = 500, 100
    outline_thickness = 7
    outline_color = rgb(122, 162, 247)
    font_family = JetBrainsMono Nerd Font
    font_size = 28
    inner_color = rgba(31, 35, 53, 0.8)
    outer_color = rgba(31, 35, 53, 0.0)
    text_color = rgb(192, 202, 245)
    font_color = rgb(192, 202, 245)
    fade_on_empty = false
    dot_size = 1
    dot_color = rgb(122, 162, 247)
    rounding = 10
    position = 0, 60
    valign = center
    halign = center
    placeholder_text = locked 
}

# Fail feedback (shake + red outline)
auth_fail {
    outer_color = rgb(247, 118, 142)
    fail_text = "incorrect"
}

