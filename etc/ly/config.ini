# === GENERAL SETTINGS & CENTERING ===
allow_empty_password = true
animation = none
animation_timeout_sec = 5
asterisk = *
auth_fails = 10
bigclock = en
blank_box = true             
box_title = null         
brightness_down_cmd = /usr/bin/brightnessctl -q s 10%-
brightness_down_key = F5
brightness_up_cmd = /usr/bin/brightnessctl -q s +10%
brightness_up_key = F6
clear_password = true
console_dev = /dev/console
default_input = login
hide_borders = false
hide_key_hints = true
initial_info_text = null
input_len = 34      
lang = en
load = true
login_cmd = null
logout_cmd = null

# === FULL CENTERING FIXES ===
margin_box_h = 0
margin_box_v = 0
text_in_center = true 

min_refresh_delta = 5
numlock = false
path = /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
restart_cmd = /sbin/shutdown -r now
restart_key = F2
save = true
service_name = ly
session_log = ly-session.log
setup_cmd = /etc/ly/setup.sh
shutdown_cmd = /sbin/shutdown -a now
shutdown_key = F1
sleep_cmd = null
sleep_key = F3

# === SESSION SELECTION & INPUT EXPERIENCE ===
vi_default_mode = normal
vi_mode = false
waylandsessions = /usr/share/wayland-sessions
x_cmd = /usr/bin/X
xauth_cmd = /usr/bin/xauth
xinitrc = ~/.xinitrc
xsessions = /usr/share/xsessions

# === OTHER USABILITY POLISH ===
default_input = login
clear_password = true
hide_borders = false
blank_box = true
hide_key_hints = true
text_in_center = true
margin_box_v = 0
margin_box_h = 0
