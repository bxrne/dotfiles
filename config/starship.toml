format = """
$username$hostname$directory$git_branch$git_status$git_state$python$cmd_duration$character
"""
add_newline = false

[directory]
 style = "bold #2f6fed"
 truncation_length = 3
truncate_to_repo = true
format = "[$path]($style) "

[character]
 success_symbol = "[∷](bold #2f6fed)"
error_symbol = "[∷](bold #FF8C00)"
vimcmd_symbol = "[∷](bold #87CEEB)"

[git_branch]
 symbol = " "                        # branch symbol
 format = "[$symbol$branch]($style) "
 style = "bold #2f6fed"

[git_status]
 format = "([$all_status$ahead_behind]($style)) "
 style = "#2f6fed"
conflicted = "="
untracked = "?"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"
stashed = "≡"

[git_state]
format = "[$state( $progress_current/$progress_total)]($style)"
style = "bold #FF8C00"

[cmd_duration]
min_time = 500
format = " [$duration]($style) "
style = "#948a8b"

[python]
symbol = "  "                          # Python logo glyph
format = "[$symbol$virtualenv]($style)"
style = "#87CEEB"

[username]
 style_user = "bold #2f6fed"
 style_root = "bold #FF8C00"
 format = "[$user]($style)@"
disabled = false
show_always = true

[hostname]
ssh_only = true
format = "📡 [$hostname]($style) "
style = "bold #87CEEB"
disabled = false
